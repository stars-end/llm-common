name: Verify AGENTS.md

on:
  pull_request:
    paths:
      - 'fragments/**'
      - 'AGENTS.md'
      - 'scripts/agents-md-compile.zsh'
      - 'scripts/verify-agents-md.sh'
      - '.github/workflows/verify-agents-md.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AGENTS.md freshness
        run: |
          chmod +x scripts/agents-md-compile.zsh
          chmod +x scripts/verify-agents-md.sh
          ./scripts/verify-agents-md.sh
